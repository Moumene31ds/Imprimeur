<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hors ligne — L'Artisan Imprimeur</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#07050e;color:#f0f0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background-image:radial-gradient(ellipse 70% 55% at 15% 15%,#1e0a4e,transparent 55%),radial-gradient(ellipse 55% 55% at 85% 85%,#1a0838,transparent 55%)}
.wrap{max-width:480px}
.icon{font-size:4rem;margin-bottom:24px}
h1{font-size:2rem;font-family:'Playfair Display',serif;font-style:italic;margin-bottom:14px;background:linear-gradient(135deg,#c4b5fd,#f9a8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
p{font-size:.95rem;color:rgba(240,240,255,.55);line-height:1.75;margin-bottom:32px}
.btn{display:inline-block;padding:14px 32px;border-radius:50px;background:linear-gradient(135deg,#9b7ef8,#f472b6);color:#fff;text-decoration:none;font-weight:600;font-size:.9rem;transition:all .25s}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(155,126,248,.5)}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=DM+Sans&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <div class="icon">📶</div>
  <h1>Vous êtes hors ligne</h1>
  <p>Vous n'êtes pas connecté à Internet. Vérifiez votre connexion et réessayez. Les pages visitées récemment sont disponibles en mode hors ligne.</p>
  <a href="/" class="btn" onclick="location.reload()">Réessayer →</a>
</div>
</body>
</html>
