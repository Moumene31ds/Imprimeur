<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page introuvable — L'Artisan Imprimeur</title>
<meta name="robots" content="noindex">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#07050e;color:#f0f0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background-image:radial-gradient(ellipse 70% 55% at 20% 20%,#1e0a4e,transparent 50%),radial-gradient(ellipse 55% 55% at 80% 80%,#1a0838,transparent 50%)}
.code{font-size:7rem;font-weight:700;line-height:1;background:linear-gradient(135deg,#c4b5fd,#f9a8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
h1{font-size:1.5rem;margin-bottom:14px;font-weight:500}
p{color:rgba(240,240,255,.5);line-height:1.75;margin-bottom:32px;max-width:420px;margin-left:auto;margin-right:auto}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:12px 28px;border-radius:50px;text-decoration:none;font-weight:600;font-size:.88rem;transition:all .25s}
.btn-p{background:linear-gradient(135deg,#9b7ef8,#f472b6);color:#fff;box-shadow:0 6px 24px rgba(155,126,248,.4)}
.btn-p:hover{transform:translateY(-2px)}
.btn-s{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.2);color:#fff}
.btn-s:hover{background:rgba(255,255,255,.16)}
</style>
</head>
<body>
<div>
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée. Revenez à l'accueil ou explorez nos produits.</p>
  <div class="links">
    <a href="index.html" class="btn btn-p">Accueil →</a>
    <a href="products.html" class="btn btn-s">Nos produits</a>
    <a href="contact.html" class="btn btn-s">Contact</a>
  </div>
</div>
</body>
</html>
